name: Deploy Hermes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts
          # Keepalives so long, output-silent remote commands (e.g. the Hermes
          # installer / `hermes update`) don't get their idle SSH channel dropped
          # by an intermediate NAT/firewall — that surfaced as
          # "client_loop: send disconnect: Broken pipe" (exit 255).
          cat > ~/.ssh/config <<'EOF'
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 120
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Install or update Hermes (idempotent)
        run: |
          # NOTE: keep the remote command (inside 'bash -lc "..."') free of
          # comments. Apostrophes (e.g. "Hermes's") would close the outer single
          # quotes early and backticks would trigger command substitution, which
          # previously broke this step with:
          #   bash: -c: line 1: unexpected EOF while looking for matching `"'
          # All explanatory prose therefore lives here, at the runner level,
          # where apostrophes and backticks are harmless.
          #
          # Fresh box: bootstrap with the installer, which also installs the
          # curated [all] deps into its own venv (/usr/local/lib/hermes-agent/venv).
          # Existing box: self-update via the documented "hermes update" command,
          # falling back to re-running the installer (it git-pulls) if that fails.
          #
          # We deliberately do NOT pip install the messaging extra here:
          #   * the hermes command is a wrapper that clears PYTHONPATH and runs
          #     its own venv, so a system pip install lands in the wrong place;
          #   * system pip on Ubuntu root is PEP 668 externally-managed and errors;
          #   * Discord/Telegram/Slack backends lazy-install into the venv on
          #     first gateway use, so they need no eager install step.
          #
          # --skip-browser: we drive the web via Hermes's lightweight
          # web_search/web_extract tools (hosted Firecrawl), NOT the local
          # Playwright/Chromium browser tool. Skipping the browser install
          # avoids the installer's best-effort "npx playwright install" (a 600s
          # download) and the headless-Chromium-on-a-tiny-droplet failure modes
          # (root/--no-sandbox hangs, OOM-killed npm) that previously broke this
          # deploy. Re-enable browser automation only if the agent must click
          # through / fill forms on pages, not merely read or search them.
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            if command -v hermes >/dev/null 2>&1; then
              hermes update || curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash -s -- --skip-browser
            else
              curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash -s -- --skip-browser
            fi
          "'

      - name: Push config.yaml
        run: scp config.yaml root@${{ secrets.DROPLET_IP }}:~/.hermes/config.yaml

      - name: Inject secrets (config set auto-routes env-var names to .env)
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            hermes config set OPENROUTER_API_KEY    ${{ secrets.OPENROUTER_KEY }}
            hermes config set DISCORD_BOT_TOKEN      ${{ secrets.DISCORD_TOKEN }}
            hermes config set DISCORD_ALLOWED_USERS  ${{ secrets.DISCORD_USER_ID }}
            hermes config set MODAL_TOKEN_ID         ${{ secrets.MODAL_TOKEN_ID }}
            hermes config set MODAL_TOKEN_SECRET     ${{ secrets.MODAL_TOKEN_SECRET }}
          "'

      - name: Enable web_search/web_extract (Firecrawl key, if configured)
        run: |
          # Hermes reaches the web through TWO independent paths, and we use the
          # lightweight one. web_search/web_extract hit hosted Firecrawl
          # server-side — no local browser — and Hermes auto-detects the backend
          # the moment FIRECRAWL_API_KEY is present in ~/.hermes/.env (no
          # config.yaml edit needed). This replaces the old local Playwright/
          # Chromium "browser tool" path, which on this root/tiny-droplet box was
          # a standing source of deploy failures (--no-sandbox launch hangs,
          # OOM-killed npm). Firecrawl's free tier (500 credits/mo) keeps this in
          # line with the repo's ~$0/day posture; SearXNG is the no-account
          # self-host alternative (see README).
          #
          # The key is OPTIONAL: if the FIRECRAWL_KEY secret is unset we skip the
          # step with a loud notice rather than writing an empty key (which would
          # half-configure the backend). Add it under repo Settings > Secrets to
          # turn web access on.
          if [ -n "${{ secrets.FIRECRAWL_KEY }}" ]; then
            ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes config set FIRECRAWL_API_KEY ${{ secrets.FIRECRAWL_KEY }}"'
          else
            echo "::warning::FIRECRAWL_KEY secret not set — web_search/web_extract stay OFF. Add it in repo Settings > Secrets and re-run to enable web access."
          fi

      - name: Reconcile config after any Hermes update
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes config check || true"'

      - name: Migrate config and fix command symlink
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes doctor --fix || true"'

      - name: Install and start the gateway as a boot-time system service
        run: |
          # --system installs a root systemd service that survives both SSH
          # logout and reboot. Three things are load-bearing here:
          #
          #   1. `yes |` auto-answers the interactive
          #      "Start the gateway now after installing the service? [Y/n]:"
          #      prompt. Over this non-interactive SSH session there is no TTY,
          #      so an unanswered prompt gets EOF and the install aborts without
          #      ever starting the gateway.
          #   2. `--run-as-user root` is required because newer Hermes refuses to
          #      install a --system service while running as root unless the target
          #      service user is named explicitly (it raised
          #      "Refusing to install the gateway system service as root; pass
          #      --run-as-user root to override"). Only needed at install time —
          #      restart/status read the identity back from the unit file.
          #   3. `enable-linger root` is a belt-and-suspenders for the user-service
          #      path: a plain user service is torn down on SSH logout unless
          #      lingering is enabled (that produced the earlier
          #      "Cannot restart gateway as a service — linger is not enabled").
          #      A true --system root service does not need it, but enabling it
          #      is harmless and covers the fallback.
          #   4. The step ENDS on `hermes gateway status` with no `|| true`, so a
          #      gateway that did not come up makes the deploy fail loudly instead
          #      of going green with a dead gateway (the previous
          #      `install || restart` swallowed the failure because `restart`
          #      only warns and exits 0).
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            set -e
            sudo loginctl enable-linger root || true
            yes | sudo hermes gateway install --system --run-as-user root
            sudo hermes gateway restart || true
            hermes gateway status
          "'

      - name: Sanity check
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes gateway status; hermes doctor || true"'
