name: Deploy Hermes

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'config.yaml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts
          # Keepalives so long, output-silent remote commands (e.g. the npm
          # install of browser tools) don't get their idle SSH channel dropped
          # by an intermediate NAT/firewall — that surfaced as
          # "client_loop: send disconnect: Broken pipe" (exit 255).
          cat > ~/.ssh/config <<'EOF'
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 120
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Install or update Hermes (idempotent)
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            # Fresh box: bootstrap with the installer, which also installs the
            # curated [all] deps into its own venv (/usr/local/lib/hermes-agent/venv).
            # Existing box: self-update via the documented hermes update command,
            # falling back to re-running the installer (it git-pulls) if that fails.
            #
            # We deliberately do NOT pip install the messaging extra here:
            #   * the hermes command is a wrapper that clears PYTHONPATH and runs
            #     its own venv, so a system pip install lands in the wrong place;
            #   * system pip on Ubuntu root is PEP 668 externally-managed and errors;
            #   * Discord/Telegram/Slack backends lazy-install into the venv on
            #     first gateway use, so they need no eager install step.
            if command -v hermes >/dev/null 2>&1; then
              hermes update || curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
            else
              curl -fsSL https://raw.githubusercontent.com/NousResearch/hermes-agent/main/scripts/install.sh | bash
            fi
          "'

      - name: Push config.yaml
        run: scp config.yaml root@${{ secrets.DROPLET_IP }}:~/.hermes/config.yaml

      - name: Inject secrets (config set auto-routes env-var names to .env)
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            hermes config set OPENROUTER_API_KEY    ${{ secrets.OPENROUTER_KEY }}
            hermes config set DISCORD_BOT_TOKEN      ${{ secrets.DISCORD_TOKEN }}
            hermes config set DISCORD_ALLOWED_USERS  ${{ secrets.DISCORD_USER_ID }}
            hermes config set MODAL_TOKEN_ID         ${{ secrets.MODAL_TOKEN_ID }}
            hermes config set MODAL_TOKEN_SECRET     ${{ secrets.MODAL_TOKEN_SECRET }}
          "'

      - name: Pin Chromium --no-sandbox so the browser tool works as root
        run: |
          # The gateway runs as root (see the gateway install step's
          # --run-as-user root). Chromium refuses to launch as root unless
          # started with --no-sandbox, so the native browser tool hangs and
          # every browser_navigate times out after ~60s on ANY url — the page
          # is irrelevant because the browser never starts
          # (NousResearch/hermes-agent#15765). Newer Hermes auto-injects
          # --no-sandbox,--disable-dev-shm-usage when it detects root, but we
          # pin it explicitly via AGENT_BROWSER_ARGS so the fix does not depend
          # on the installed Hermes version's auto-detection (the README already
          # warns the schema/behavior drifts between releases).
          #
          # AGENT_BROWSER_ARGS is a non-secret env var, so it lives in
          # ~/.hermes/.env. We write the line directly (idempotently) rather
          # than via `hermes config set`, whose arg parser would choke on a
          # value that begins with --. The gateway restart later in this deploy
          # picks up the new env.
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            set -e
            mkdir -p ~/.hermes
            touch ~/.hermes/.env
            grep -v ^AGENT_BROWSER_ARGS= ~/.hermes/.env > ~/.hermes/.env.next || true
            echo AGENT_BROWSER_ARGS=--no-sandbox,--disable-dev-shm-usage >> ~/.hermes/.env.next
            mv ~/.hermes/.env.next ~/.hermes/.env
            chmod 600 ~/.hermes/.env
          "'

      - name: Ensure Playwright Chromium is installed and launches (browser tool)
        run: |
          # Pinning --no-sandbox (previous step) is necessary but NOT sufficient:
          # it only matters if there is a browser to launch. The Hermes installer
          # *does* run `npx playwright install --with-deps chromium`, but that
          # step is best-effort — it runs under a 600s timeout and its failure is
          # swallowed (`... || log_warn "browser tools will not work"`), so the
          # installer still exits 0 with NO Chromium binary on disk. A fresh box
          # whose browser install timed out (slow apt, npx download) therefore
          # deploys green with a gateway that comes up fine, yet every
          # browser_navigate hangs the full ~60s and times out on ANY url because
          # Chromium never starts — the same symptom as the root/--no-sandbox bug,
          # a different root cause. So we install Chromium explicitly here. It is
          # idempotent: playwright is a near-instant no-op once the matching
          # revision is already present.
          #
          # We run from the Hermes node install dir (INSTALL_DIR for root on
          # Linux = /usr/local/lib/hermes-agent, per the installer's
          # resolve_install_layout). The browser tool is a Node project there
          # (package.json + node_modules) and the gateway loads playwright via
          # `require("playwright")` resolved from that dir. Crucially, the
          # installer's `npm install` is ALSO best-effort — it runs
          # `npm install --silent 2>/dev/null || log_warn "..."`, so its failure
          # is swallowed exactly like the browser install. A box can therefore be
          # left with package.json present but node_modules (and the project-local
          # playwright) missing; then `require("playwright")` throws
          # MODULE_NOT_FOUND and a bare `npx playwright install` only fetches a
          # throwaway copy that never populates node_modules — which is precisely
          # the failure this deploy hit. So we run `npm install` FIRST (loud, no
          # `|| true`) to materialize the same project-local playwright the
          # gateway resolves, and only then `npx playwright`, whose cache
          # populates root's ~/.cache/ms-playwright — the same cache the (root)
          # gateway reads.
          #
          # The node smoke test then launches headless Chromium with the SAME
          # flags the gateway uses and navigates a page. There is no `|| true`:
          # this catches all three failure modes — missing binary, the
          # root/--no-sandbox launch hang, and blocked outbound network (the
          # alternate theory) — and fails the deploy loudly instead of going
          # green with a browser tool that times out in production. The heredoc
          # is piped to `bash -ls` on stdin (a login shell, so node is on PATH)
          # with a quoted 'REMOTE' delimiter, so the node -e script needs no
          # quote-escaping gymnastics.
          ssh root@${{ secrets.DROPLET_IP }} 'bash -ls' <<'REMOTE'
          set -euo pipefail
          cd /usr/local/lib/hermes-agent
          npm install
          npx playwright install --with-deps chromium
          node -e 'const { chromium } = require("playwright"); chromium.launch({ args: ["--no-sandbox", "--disable-dev-shm-usage"] }).then(async (b) => { const p = await b.newPage(); await p.goto("https://example.com", { timeout: 30000 }); console.log("browser smoke OK:", await p.title()); await b.close(); }).catch((e) => { console.error("browser smoke FAILED:", e && e.message ? e.message : e); process.exit(1); });'
          REMOTE

      - name: Reconcile config after any Hermes update
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes config check || true"'

      - name: Migrate config and fix command symlink
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes doctor --fix || true"'

      - name: Install and start the gateway as a boot-time system service
        run: |
          # --system installs a root systemd service that survives both SSH
          # logout and reboot. Three things are load-bearing here:
          #
          #   1. `yes |` auto-answers the interactive
          #      "Start the gateway now after installing the service? [Y/n]:"
          #      prompt. Over this non-interactive SSH session there is no TTY,
          #      so an unanswered prompt gets EOF and the install aborts without
          #      ever starting the gateway.
          #   2. `--run-as-user root` is required because newer Hermes refuses to
          #      install a --system service while running as root unless the target
          #      service user is named explicitly (it raised
          #      "Refusing to install the gateway system service as root; pass
          #      --run-as-user root to override"). Only needed at install time —
          #      restart/status read the identity back from the unit file.
          #   3. `enable-linger root` is a belt-and-suspenders for the user-service
          #      path: a plain user service is torn down on SSH logout unless
          #      lingering is enabled (that produced the earlier
          #      "Cannot restart gateway as a service — linger is not enabled").
          #      A true --system root service does not need it, but enabling it
          #      is harmless and covers the fallback.
          #   4. The step ENDS on `hermes gateway status` with no `|| true`, so a
          #      gateway that did not come up makes the deploy fail loudly instead
          #      of going green with a dead gateway (the previous
          #      `install || restart` swallowed the failure because `restart`
          #      only warns and exits 0).
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "
            set -e
            sudo loginctl enable-linger root || true
            yes | sudo hermes gateway install --system --run-as-user root
            sudo hermes gateway restart || true
            hermes gateway status
          "'

      - name: Sanity check
        run: |
          ssh root@${{ secrets.DROPLET_IP }} 'bash -lc "hermes gateway status; hermes doctor || true"'
