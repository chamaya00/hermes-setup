# ~/.hermes/config.yaml — committed to the repo. NON-SECRET behavior only.
#
# Secrets are NOT here. They are injected into ~/.hermes/.env at deploy time
# by the GitHub Actions workflow:
#   OPENROUTER_API_KEY, DISCORD_BOT_TOKEN, DISCORD_ALLOWED_USERS,
#   MODAL_TOKEN_ID, MODAL_TOKEN_SECRET
#
# After your first deploy, run `hermes config show` on the Droplet once to
# confirm these key names match your installed Hermes version, since the
# schema can drift between releases.

model:
  provider: openrouter
  model: openai/gpt-oss-20b:free   # auto-selected by update-free-model workflow (2026-06-07); live free model w/ tool calling. Do not hand-edit.

terminal:
  backend: modal                       # serverless sandbox; hibernates when idle

# Browser tool note (not a config.yaml key): the local browser tool drives
# Chromium via Playwright (Node). Two independent things must both hold or every
# browser_navigate hangs ~60s and times out on ANY url:
#   1. The Chromium *binary* must actually be installed. The Hermes installer's
#      `npx playwright install --with-deps chromium` is best-effort (600s timeout,
#      failure swallowed), so deploy.yml installs + smoke-tests it explicitly in
#      the "Ensure Playwright Chromium is installed and launches" step.
#   2. The gateway runs as root, and Chromium will not launch as root without
#      --no-sandbox. The launch flags are pinned via the AGENT_BROWSER_ARGS env
#      var in ~/.hermes/.env, written by the "Pin Chromium --no-sandbox" step.

agent:
  max_turns: 90

display:
  tool_progress: "new"                 # off | new | all | verbose

gateway:
  platforms:
    discord:
      home_chat_id: ""                 # optional: channel ID for proactive/cron delivery
      gateway_restart_notification: false
      require_mention: true            # only respond to @mention in channels; DMs always work
      free_response_channels: ""       # comma-separated channel IDs that reply without mention
      auto_thread: true                # auto-create a thread on @mention in a channel
