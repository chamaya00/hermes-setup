# ~/.hermes/config.yaml — committed to the repo. NON-SECRET behavior only.
#
# Secrets are NOT here. They are injected into ~/.hermes/.env at deploy time
# by the GitHub Actions workflow:
#   OPENROUTER_API_KEY, DISCORD_BOT_TOKEN, DISCORD_ALLOWED_USERS,
#   MODAL_TOKEN_ID, MODAL_TOKEN_SECRET
#
# After your first deploy, run `hermes config show` on the Droplet once to
# confirm these key names match your installed Hermes version, since the
# schema can drift between releases.

model:
  provider: openrouter
  model: openai/gpt-oss-20b:free   # auto-selected by update-free-model workflow (2026-07-16); live free model w/ tool calling. Do not hand-edit.

terminal:
  backend: modal                       # serverless sandbox; hibernates when idle

# Web access note (not a config.yaml key): this agent reads/searches the web via
# Hermes's lightweight web_search/web_extract tools, which run server-side through
# hosted Firecrawl — NO local browser. Hermes auto-detects the backend once
# FIRECRAWL_API_KEY is present in ~/.hermes/.env, so deploy.yml injects that key
# (from the FIRECRAWL_KEY GitHub secret) instead of installing Chromium. The
# installer is run with --skip-browser.
#
# We deliberately do NOT use the local Playwright/Chromium "browser tool": on this
# root/tiny-droplet box it was a standing source of deploy failures (root needs
# --no-sandbox or launches hang; the from-scratch `npm install` OOM-killed the
# box). The browser tool is only worth re-introducing if the agent must *interact*
# with pages (click, fill forms, scrape JS-only SPAs) — not merely read or search
# them. The docs are explicit: prefer web_search/web_extract; they are faster and
# cheaper.

agent:
  max_turns: 90

display:
  tool_progress: "new"                 # off | new | all | verbose

gateway:
  platforms:
    discord:
      home_chat_id: ""                 # optional: channel ID for proactive/cron delivery
      gateway_restart_notification: false
      require_mention: true            # only respond to @mention in channels; DMs always work
      free_response_channels: ""       # comma-separated channel IDs that reply without mention
      auto_thread: true                # auto-create a thread on @mention in a channel
